services:
  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voucher_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - voucher_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    environment:
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-voucher_db}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-admin123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  # Nginx Web Server
  webserver:
    image: nginx:alpine
    container_name: voucher_webserver
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - voucher_network
    depends_on:
      - app

  # MySQL Database - DISABLED (Using existing MariaDB on host)
  # Uncomment if you want to use containerized MySQL instead
  # db:
  #   image: mysql:8.0
  #   container_name: voucher_db
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_DATABASE: ${DB_DATABASE:-voucher_db}
  #     MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
  #     MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
  #     MYSQL_USER: ${DB_USERNAME:-voucher_user}
  #   ports:
  #     - "${DB_PORT:-3307}:3306"
  #   volumes:
  #     - dbdata:/var/lib/mysql
  #     - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
  #   networks:
  #     - voucher_network

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: voucher_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - voucher_network

  # Laravel Scheduler (Cron)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voucher_scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - voucher_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    command: /bin/sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"

  # Laravel Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voucher_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - voucher_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600

networks:
  voucher_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
